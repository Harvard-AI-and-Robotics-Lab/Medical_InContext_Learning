name: extract_dinov3_global_breakhis
seed: 3407
data_root: data/raw/BreaKHis_v1_extracted
output_root: outputs
features_root: outputs/features_dinov3_global_breakhis

encoder:
  name: dinov3
  model_id: facebook/dinov3-vitl16-pretrain-lvd1689m
  device: cuda
  batch_size: 8
  image_size: 512
  normalize: true

retrieval:
  method: global
  k: 6
  similarity_metric: cosine
  exclude_query: true
  exclude_test_set: true

datasets:
  - breakhis

methods:
  - rg_icl_global_similarity

manifest_csv: manifests/breakhis_patient_split_seed3407.csv
