name: extract_clip_global_ddr
seed: 3407
data_root: .
output_root: outputs
features_root: outputs/features_clip_global_ddr_1024

encoder:
  name: clip
  model_id: openai/clip-vit-large-patch14
  device: cuda
  batch_size: 32
  image_size: 224
  normalize: true
  return_spatial: false

retrieval:
  method: global
  k: 6
  similarity_metric: cosine
  exclude_query: true
  exclude_test_set: true

datasets:
  - ddr

methods:
  - rg_icl_global_similarity

manifest_csv: manifests/ddr_official_split_crop_pad_1024.csv
