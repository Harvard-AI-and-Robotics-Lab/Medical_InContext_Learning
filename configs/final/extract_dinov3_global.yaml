name: extract_dinov3_global_lag
seed: 3407
data_root: data/LAG
output_root: outputs
features_root: outputs/features_dinov3_global

encoder:
  name: dinov3
  model_id: facebook/dinov3-vitl16-pretrain-lvd1689m
  device: cuda
  batch_size: 8
  image_size: 512
  normalize: true

retrieval:
  method: global
  k: 6
  similarity_metric: cosine
  exclude_query: true
  exclude_test_set: true

datasets:
  - lag_project

methods:
  - rg_icl_global_similarity

manifest_csv: manifests/lag_manifest.csv
